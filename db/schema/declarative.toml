[[demo]]
doc = 'Default Project + 3 milestones + 5 components + 8 tags + 25 dense tasks. Tasks reference assignee / milestone / component / tags by card id. No status / workflow is baked in — project admins define their own by adding a card_type + a card_ref attribute_def.'
sql = """
DO $demo$
DECLARE
    proj_id   bigint;
    cid       bigint;
    aid       bigint;
    title_ad  int := (SELECT id FROM attribute_def WHERE name='title');
    path_ad   int := (SELECT id FROM attribute_def WHERE name='path');
    root_ad   int := (SELECT id FROM attribute_def WHERE name='root_exclusive_at');
    desc_ad   int := (SELECT id FROM attribute_def WHERE name='description');
    sort_ad   int := (SELECT id FROM attribute_def WHERE name='sort_order');
    assn_ad   int := (SELECT id FROM attribute_def WHERE name='assignee');
    miles_ad  int := (SELECT id FROM attribute_def WHERE name='milestone_ref');
    comp_ad   int := (SELECT id FROM attribute_def WHERE name='component_ref');
    tags_ad   int := (SELECT id FROM attribute_def WHERE name='tags');
    proj_ct   int := (SELECT id FROM card_type WHERE name='project');
    task_ct   int := (SELECT id FROM card_type WHERE name='task');
    miles_ct  int := (SELECT id FROM card_type WHERE name='milestone');
    comp_ct   int := (SELECT id FROM card_type WHERE name='component');
    tag_ct    int := (SELECT id FROM card_type WHERE name='tag');
    status_ct int := (SELECT id FROM card_type WHERE name='status');
    status_ad int := (SELECT id FROM attribute_def WHERE name='status');
    predicate_ad int := (SELECT id FROM attribute_def WHERE name='predicate');
    status_todo_id bigint; status_doing_id bigint; status_review_id bigint; status_done_id bigint; status_cancel_id bigint;
    status_id bigint;
    task_idx int := 0;
    alice_id bigint := 2; bob_id bigint := 3; carol_id bigint := 4; dave_id bigint := 5; eve_id bigint := 6;
    m1_id bigint; m2_id bigint; m3_id bigint;
    fe_id bigint; be_id bigint; db_id bigint; auth_id bigint; ui_id bigint;
    pri_high_id bigint; pri_med_id bigint; pri_low_id bigint;
    area_fe_id bigint; area_be_id bigint;
    team_plat_id bigint; team_prod_id bigint; team_grow_id bigint;
    title text;
    rec record;
    tag_ids jsonb;
    sort_value jsonb;
    screen_ct          int := (SELECT id FROM card_type     WHERE name='screen');
    filter_ct          int := (SELECT id FROM card_type     WHERE name='filter');
    screen_type_ad     int := (SELECT id FROM attribute_def WHERE name='screen_type');
    default_filter_ad  int := (SELECT id FROM attribute_def WHERE name='default_filter');
    column_attr_ad     int := (SELECT id FROM attribute_def WHERE name='column_attr');
    screen_id bigint;
    filter_id bigint;
    rec2      record;
BEGIN
    -- Skip if Default Project already exists.
    SELECT c.id INTO proj_id FROM card c JOIN attribute_value av ON av.card_id=c.id AND av.attribute_def_id=title_ad WHERE c.card_type_id=proj_ct AND av.value='"Default Project"'::jsonb ORDER BY c.id LIMIT 1;
    IF proj_id IS NOT NULL THEN RETURN; END IF;

    -- Default Project.
    INSERT INTO card (card_type_id, parent_card_id) VALUES (proj_ct, NULL) RETURNING id INTO proj_id;
    INSERT INTO activity (card_id, kind, actor_id) VALUES (proj_id, 'card_create', 1);
    INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (proj_id, 'attr_update', title_ad, NULL, '"Default Project"'::jsonb, 1) RETURNING id INTO aid;
    INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (proj_id, title_ad, '"Default Project"'::jsonb, aid);

    -- Milestones.
    FOREACH title IN ARRAY ARRAY['M1','M2','M3'] LOOP
        INSERT INTO card (card_type_id, parent_card_id) VALUES (miles_ct, proj_id) RETURNING id INTO cid;
        INSERT INTO activity (card_id, kind, actor_id) VALUES (cid, 'card_create', 1);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', title_ad, NULL, to_jsonb(title), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, title_ad, to_jsonb(title), aid);
        IF title='M1' THEN m1_id := cid; ELSIF title='M2' THEN m2_id := cid; ELSE m3_id := cid; END IF;
    END LOOP;

    -- Components.
    FOREACH title IN ARRAY ARRAY['Frontend','Backend','DB','Auth','UI'] LOOP
        INSERT INTO card (card_type_id, parent_card_id) VALUES (comp_ct, proj_id) RETURNING id INTO cid;
        INSERT INTO activity (card_id, kind, actor_id) VALUES (cid, 'card_create', 1);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', title_ad, NULL, to_jsonb(title), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, title_ad, to_jsonb(title), aid);
        IF title='Frontend' THEN fe_id := cid;
        ELSIF title='Backend' THEN be_id := cid;
        ELSIF title='DB'     THEN db_id := cid;
        ELSIF title='Auth'   THEN auth_id := cid;
        ELSE                       ui_id := cid; END IF;
    END LOOP;

    -- Tag cards. Each gets title (= path for readability), path, and optional root_exclusive_at.
    FOR rec IN SELECT * FROM jsonb_to_recordset('[
        {"p":"priority/high","r":"priority"},
        {"p":"priority/med", "r":"priority"},
        {"p":"priority/low", "r":"priority"},
        {"p":"area/frontend"},
        {"p":"area/backend"},
        {"p":"team/platform"},
        {"p":"team/product"},
        {"p":"team/growth"}
    ]'::jsonb) AS x(p text, r text) LOOP
        INSERT INTO card (card_type_id, parent_card_id) VALUES (tag_ct, proj_id) RETURNING id INTO cid;
        INSERT INTO activity (card_id, kind, actor_id) VALUES (cid, 'card_create', 1);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', title_ad, NULL, to_jsonb(rec.p), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, title_ad, to_jsonb(rec.p), aid);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', path_ad, NULL, to_jsonb(rec.p), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, path_ad, to_jsonb(rec.p), aid);
        IF rec.r IS NOT NULL THEN
            INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', root_ad, NULL, to_jsonb(rec.r), 1) RETURNING id INTO aid;
            INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, root_ad, to_jsonb(rec.r), aid);
        END IF;
        IF    rec.p='priority/high' THEN pri_high_id := cid;
        ELSIF rec.p='priority/med'  THEN pri_med_id  := cid;
        ELSIF rec.p='priority/low'  THEN pri_low_id  := cid;
        ELSIF rec.p='area/frontend' THEN area_fe_id  := cid;
        ELSIF rec.p='area/backend'  THEN area_be_id  := cid;
        ELSIF rec.p='team/platform' THEN team_plat_id := cid;
        ELSIF rec.p='team/product'  THEN team_prod_id := cid;
        ELSE                            team_grow_id := cid; END IF;
    END LOOP;

    -- Status value cards. Done + Cancelled are terminal (is_terminal=TRUE); the
    -- predicate compiler hides tasks pointing at them when notTerminal(status)
    -- is active, which is the default filter set further down.
    FOR rec IN SELECT * FROM jsonb_to_recordset('[
        {"t":"Todo",     "o":1, "k":false},
        {"t":"Doing",    "o":2, "k":false},
        {"t":"Review",   "o":3, "k":false},
        {"t":"Done",     "o":4, "k":true},
        {"t":"Cancelled","o":5, "k":true}
    ]'::jsonb) AS x(t text, o int, k boolean) LOOP
        INSERT INTO card (card_type_id, parent_card_id, is_terminal) VALUES (status_ct, proj_id, rec.k) RETURNING id INTO cid;
        INSERT INTO activity (card_id, kind, actor_id) VALUES (cid, 'card_create', 1);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', title_ad, NULL, to_jsonb(rec.t), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, title_ad, to_jsonb(rec.t), aid);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', sort_ad, NULL, to_jsonb(rec.o), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, sort_ad, to_jsonb(rec.o), aid);
        IF    rec.t='Todo'      THEN status_todo_id   := cid;
        ELSIF rec.t='Doing'     THEN status_doing_id  := cid;
        ELSIF rec.t='Review'    THEN status_review_id := cid;
        ELSIF rec.t='Done'      THEN status_done_id   := cid;
        ELSE                         status_cancel_id := cid; END IF;
    END LOOP;

    -- 25 dense tasks. Each is also assigned a status (round-robin) so the
    -- default notTerminal(status) filter has something to hide.
    FOR rec IN SELECT * FROM jsonb_to_recordset(jsonb_build_array(
        jsonb_build_object('title','Wire pickers (dense#1)',     'assignee',alice_id,'milestone',m1_id, 'component',fe_id,   'tags',jsonb_build_array(pri_high_id),                'description','Replace ad-hoc pickers in the dense table with the shared component.'),
        jsonb_build_object('title','API rate limits',            'assignee',alice_id,'milestone',m1_id, 'component',be_id,   'tags',jsonb_build_array(pri_high_id, area_be_id),    'description','Cap per-IP request rate at the gateway and return a structured 429 with retry-after.'),
        jsonb_build_object('title','Empty state copy',           'assignee',bob_id,  'milestone',m1_id, 'component',fe_id,   'tags',jsonb_build_array(pri_med_id),                 'description','Rewrite the empty-state strings on Projects, Inbox, and Grid to match the voice guide.'),
        jsonb_build_object('title','Connection pool tuning',     'assignee',bob_id,  'milestone',m2_id, 'component',db_id,   'tags',jsonb_build_array(pri_low_id)),
        jsonb_build_object('title','OIDC callback URL',          'assignee',carol_id,'milestone',m2_id, 'component',auth_id, 'tags',jsonb_build_array(pri_high_id),                'description','Allow the redirect URL to be configured per environment without rebuilding the client.'),
        jsonb_build_object('title','Triage backlog',             'assignee',dave_id, 'milestone',NULL,  'component',NULL,    'tags',jsonb_build_array(pri_med_id)),
        jsonb_build_object('title','Onboarding checklist v2',    'assignee',eve_id,  'milestone',m3_id, 'component',ui_id,   'tags',jsonb_build_array(pri_low_id, team_grow_id)),
        jsonb_build_object('title','Theme tokens',               'assignee',alice_id,'milestone',m2_id, 'component',fe_id,   'tags',jsonb_build_array(pri_high_id, team_prod_id)),
        jsonb_build_object('title','Activity feed pagination',   'assignee',alice_id,'milestone',m1_id, 'component',be_id,   'tags',jsonb_build_array(pri_high_id),                'description','Page the activity stream by activity id so older comments load on demand.'),
        jsonb_build_object('title','Read replica failover',      'assignee',bob_id,  'milestone',m2_id, 'component',db_id,   'tags',jsonb_build_array(pri_med_id, area_be_id)),
        jsonb_build_object('title','Component editor refactor',  'assignee',carol_id,'milestone',m2_id, 'component',fe_id,   'tags',jsonb_build_array(pri_high_id, area_fe_id),   'description','Split the component editor into a header/body pair and isolate the autosave timer.'),
        jsonb_build_object('title','JWKS cache',                 'assignee',dave_id, 'milestone',m3_id, 'component',auth_id, 'tags',jsonb_build_array(pri_med_id),                 'description','Cache the OP''s JWKS for an hour with stale-while-revalidate on signature failures.'),
        jsonb_build_object('title','Onboarding analytics',       'assignee',eve_id,  'milestone',m1_id, 'component',ui_id,   'tags',jsonb_build_array(team_grow_id)),
        jsonb_build_object('title','Audit log retention',        'assignee',alice_id,'milestone',NULL,  'component',NULL,    'tags',jsonb_build_array(pri_low_id, team_prod_id)),
        jsonb_build_object('title','Empty grid placeholder',     'assignee',alice_id,'milestone',m3_id, 'component',fe_id,   'tags',jsonb_build_array(pri_med_id)),
        jsonb_build_object('title','Idempotency-Key store',      'assignee',bob_id,  'milestone',m2_id, 'component',be_id,   'tags',jsonb_build_array(pri_high_id),                'description','Persist responses keyed by (user, key) for 24h and replay on duplicate submission.'),
        jsonb_build_object('title','Schema migration runner',    'assignee',carol_id,'milestone',m3_id, 'component',db_id,   'tags',jsonb_build_array(pri_low_id, area_be_id),    'description','Tighten the migration runner: per-file transactions, lock to serialise concurrent boots.'),
        jsonb_build_object('title','PKCE refresh',               'assignee',dave_id, 'milestone',m1_id, 'component',auth_id, 'tags',jsonb_build_array(pri_high_id, team_plat_id)),
        jsonb_build_object('title','Kanban swim lane DnD',       'assignee',eve_id,  'milestone',m2_id, 'component',ui_id,   'tags',jsonb_build_array(pri_med_id),                 'description','Drag-drop across both column and lane should issue exactly one batch with two attribute writes.'),
        jsonb_build_object('title','Set up CI cache',            'assignee',alice_id,'milestone',m1_id, 'component',fe_id,   'tags',jsonb_build_array(pri_high_id, team_plat_id)),
        jsonb_build_object('title','Migrate to pgx v5',          'assignee',alice_id,'milestone',m2_id, 'component',be_id,   'tags',jsonb_build_array(pri_high_id)),
        jsonb_build_object('title','Bigserial primary keys',     'assignee',bob_id,  'milestone',m1_id, 'component',db_id,   'tags',jsonb_build_array(pri_med_id)),
        jsonb_build_object('title','Repo bootstrap docs',        'assignee',carol_id,'milestone',m3_id, 'component',NULL,    'tags',jsonb_build_array(pri_med_id)),
        jsonb_build_object('title','Linter rule for INSERT',     'assignee',dave_id, 'milestone',m2_id, 'component',NULL,    'tags',jsonb_build_array(pri_low_id, team_plat_id)),
        jsonb_build_object('title','Closed: dispatcher MVP',     'assignee',carol_id,'milestone',NULL,  'component',ui_id,   'tags','[]'::jsonb)
    )) AS x(title text, assignee bigint, milestone bigint, component bigint, tags jsonb, description text) LOOP
        INSERT INTO card (card_type_id, parent_card_id) VALUES (task_ct, proj_id) RETURNING id INTO cid;
        INSERT INTO activity (card_id, kind, actor_id) VALUES (cid, 'card_create', 1);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', title_ad, NULL, to_jsonb(rec.title), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, title_ad, to_jsonb(rec.title), aid);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', assn_ad, NULL, to_jsonb(rec.assignee), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, assn_ad, to_jsonb(rec.assignee), aid);
        IF rec.milestone IS NOT NULL THEN
            INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', miles_ad, NULL, to_jsonb(rec.milestone), 1) RETURNING id INTO aid;
            INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, miles_ad, to_jsonb(rec.milestone), aid);
        END IF;
        IF rec.component IS NOT NULL THEN
            INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', comp_ad, NULL, to_jsonb(rec.component), 1) RETURNING id INTO aid;
            INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, comp_ad, to_jsonb(rec.component), aid);
        END IF;
        tag_ids := rec.tags;
        IF jsonb_array_length(tag_ids) > 0 THEN
            INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'tag_apply', tags_ad, '[]'::jsonb, tag_ids, 1) RETURNING id INTO aid;
            INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, tags_ad, tag_ids, aid);
        END IF;
        IF rec.description IS NOT NULL THEN
            INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', desc_ad, NULL, to_jsonb(rec.description), 1) RETURNING id INTO aid;
            INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, desc_ad, to_jsonb(rec.description), aid);
        END IF;
        sort_value := to_jsonb(cid::bigint * 100);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', sort_ad, NULL, sort_value, 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, sort_ad, sort_value, aid);

        -- Status: round-robin across the 5 values so the demo has a few in
        -- every state, including the terminal ones. The title-prefix 'Closed:'
        -- forces Done so a manually-curated terminal example survives the
        -- rotation.
        task_idx := task_idx + 1;
        IF rec.title LIKE 'Closed:%' THEN
            status_id := status_done_id;
        ELSIF task_idx % 11 = 0 THEN
            status_id := status_cancel_id;
        ELSIF task_idx % 7 = 0 THEN
            status_id := status_done_id;
        ELSIF task_idx % 3 = 0 THEN
            status_id := status_review_id;
        ELSIF task_idx % 2 = 0 THEN
            status_id := status_doing_id;
        ELSE
            status_id := status_todo_id;
        END IF;
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (cid, 'attr_update', status_ad, NULL, to_jsonb(status_id), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (cid, status_ad, to_jsonb(status_id), aid);
    END LOOP;

    -- Screens + a single Default filter card per screen. screen.default_filter
    -- points at the matching filter so the client opens to a sensible preset
    -- on first load; the kanban filter sets column_attr='milestone_ref' so the
    -- demo board has columns out of the box.
    FOR rec2 IN SELECT * FROM jsonb_to_recordset('[
        {"st":"inbox",          "t":"Inbox",          "o":1, "ca":null},
        {"st":"grid",           "t":"Grid",           "o":2, "ca":null},
        {"st":"kanban",         "t":"Kanban",         "o":3, "ca":"milestone_ref"},
        {"st":"project_detail", "t":"Project detail", "o":4, "ca":null}
    ]'::jsonb) AS x(st text, t text, o int, ca text) LOOP
        INSERT INTO card (card_type_id, parent_card_id) VALUES (screen_ct, proj_id) RETURNING id INTO screen_id;
        INSERT INTO activity (card_id, kind, actor_id) VALUES (screen_id, 'card_create', 1);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (screen_id, 'attr_update', title_ad, NULL, to_jsonb(rec2.t), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (screen_id, title_ad, to_jsonb(rec2.t), aid);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (screen_id, 'attr_update', screen_type_ad, NULL, to_jsonb(rec2.st), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (screen_id, screen_type_ad, to_jsonb(rec2.st), aid);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (screen_id, 'attr_update', sort_ad, NULL, to_jsonb(rec2.o), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (screen_id, sort_ad, to_jsonb(rec2.o), aid);

        INSERT INTO card (card_type_id, parent_card_id) VALUES (filter_ct, screen_id) RETURNING id INTO filter_id;
        INSERT INTO activity (card_id, kind, actor_id) VALUES (filter_id, 'card_create', 1);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (filter_id, 'attr_update', title_ad, NULL, '"Default"'::jsonb, 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (filter_id, title_ad, '"Default"'::jsonb, aid);
        -- Default predicate: hide tasks whose `status` points at a terminal
        -- status value (Done / Cancelled). One notTerminal leaf, no values.
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (filter_id, 'attr_update', predicate_ad, NULL, to_jsonb('{"attr":"status","op":"not terminal"}'::text), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (filter_id, predicate_ad, to_jsonb('{"attr":"status","op":"not terminal"}'::text), aid);
        IF rec2.ca IS NOT NULL THEN
            INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (filter_id, 'attr_update', column_attr_ad, NULL, to_jsonb(rec2.ca), 1) RETURNING id INTO aid;
            INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (filter_id, column_attr_ad, to_jsonb(rec2.ca), aid);
        END IF;

        -- Wire screen.default_filter to the filter we just created.
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (screen_id, 'attr_update', default_filter_ad, NULL, to_jsonb(filter_id), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (screen_id, default_filter_ad, to_jsonb(filter_id), aid);
    END LOOP;
END $demo$"""
