<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none" role="img" aria-label="Task tracker logo: two feeds drawn into a draining reactor disc">
  <defs>
    <mask id="drain2">
      <rect width="48" height="48" fill="#fff"/>
      <circle cx="24" cy="25" r="3.4" fill="#000"/>
    </mask>
  </defs>
  <!-- two inputs: source nodes feeding into the reactor shoulders -->
  <circle cx="8" cy="16" r="2.6" fill="#93a4b8"/>
  <circle cx="40" cy="16" r="2.6" fill="#93a4b8"/>
  <path d="M9 17 L17 22" stroke="#93a4b8" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M39 17 L31 22" stroke="#93a4b8" stroke-width="4.5" stroke-linecap="round"/>
  <!-- reactor: solid disc with an open drain at its core -->
  <circle cx="24" cy="25" r="9" fill="#006fff" mask="url(#drain2)"/>
</svg>
