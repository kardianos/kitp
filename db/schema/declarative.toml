[[seed.rows]]
doc = 'Worker plus the ability to create/edit/delete projects, milestones, components, and tags within scope.'
name = 'manager'

[[seed.rows]]
doc = 'Manager plus user role management and OIDC claim mapping.'
name = 'admin'

[[seed]]
doc = "System User (id=1) gets BOTH 'system' (every grant) and 'admin' (so the BFF dev session lights up the sidebar Admin section and any role-gated UI). Demo team (alice/bob/carol/dave/eve) get the 'admin' role. OIDC mode replaces this seed via role_mapping."
table = 'user_role'
sql = """
INSERT INTO user_role (user_id, role_id, scope_card_id) SELECT 1, r.id, NULL FROM role r WHERE r.name IN ('system','admin') ON CONFLICT DO NOTHING; INSERT INTO user_role (user_id, role_id, scope_card_id) SELECT u.id, r.id, NULL FROM user_account u CROSS JOIN role r WHERE u.id IN (2,3,4,5,6) AND r.name = 'admin' ON CONFLICT DO NOTHING"""

