[[seed]]
doc = 'Person cards for System User + the demo team. Explicit card ids 1..6 mirror user_account ids so the demo task assignees (alice_id=2, etc.) resolve naturally; user_account_person bridges the login. Activity rows match what the runtime would emit on card_create + attr_update.'
sql = """
DO $persons$
DECLARE
    aid bigint;
    person_ct bigint := (SELECT id FROM card_type     WHERE name='person');
    title_ad  bigint := (SELECT id FROM attribute_def WHERE name='title');
    email_ad  bigint := (SELECT id FROM attribute_def WHERE name='email');
    rec       record;
BEGIN
    -- Seed person cards 1..6 only on a fresh card table. The explicit
    -- ids assume those slots are empty; on a partially-populated DB
    -- (older schema, post-restore, e2e run) we skip to avoid colliding
    -- with non-person rows that already occupy 1..6.
    IF (SELECT count(*) FROM card) > 0 THEN RETURN; END IF;
    FOR rec IN SELECT * FROM jsonb_to_recordset('[
        {"uid":1,"cid":1,"name":"System","email":null},
        {"uid":2,"cid":2,"name":"alice", "email":"alice@example.invalid"},
        {"uid":3,"cid":3,"name":"bob",   "email":"bob@example.invalid"},
        {"uid":4,"cid":4,"name":"carol", "email":"carol@example.invalid"},
        {"uid":5,"cid":5,"name":"dave",  "email":"dave@example.invalid"},
        {"uid":6,"cid":6,"name":"eve",   "email":"eve@example.invalid"}
    ]'::jsonb) AS x(uid bigint, cid bigint, name text, email text) LOOP
        INSERT INTO card (id, card_type_id, parent_card_id) VALUES (rec.cid, person_ct, NULL);
        INSERT INTO activity (card_id, kind, actor_id) VALUES (rec.cid, 'card_create', 1);
        INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (rec.cid, 'attr_update', title_ad, NULL, to_jsonb(rec.name), 1) RETURNING id INTO aid;
        INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (rec.cid, title_ad, to_jsonb(rec.name), aid);
        IF rec.email IS NOT NULL THEN
            INSERT INTO activity (card_id, kind, attribute_def_id, value_old, value_new, actor_id) VALUES (rec.cid, 'attr_update', email_ad, NULL, to_jsonb(rec.email), 1) RETURNING id INTO aid;
            INSERT INTO attribute_value (card_id, attribute_def_id, value, last_activity_id) VALUES (rec.cid, email_ad, to_jsonb(rec.email), aid);
        END IF;
        INSERT INTO user_account_person (user_account_id, person_card_id) VALUES (rec.uid, rec.cid);
    END LOOP;
    -- Advance card_id_seq past our manually-assigned ids so the next
    -- INSERT INTO card without an explicit id picks 7+.
    PERFORM setval('card_id_seq', (SELECT MAX(id) FROM card));
END $persons$"""

