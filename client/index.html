<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kitp</title>
    <!--
      Theme bootstrap runs synchronously before the SPA bundle so a
      reload doesn't flash the light palette on dark-mode users. The
      source lives in client/public/theme-boot.js (Vite copies it to
      dist/ verbatim at build time). Pulled out of an inline <script>
      so the strict CSP can ship `script-src 'self'` with no
      `'unsafe-inline'` hole. Keep in sync with src/shell/theme.svelte.ts.
    -->
    <script src="/theme-boot.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
