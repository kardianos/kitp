doc = 'Canonical kitp database schema. server/cmd/schema-gen reads this file and emits a CREATE-everything + INSERT-seeds SQL script. tables[] defines DDL; seed[] is always applied; demo[] is opt-in fixture data for a populated dev DB. There is no forward-only migration chain — schema changes happen by editing this file.'
extensions = ['pg_trgm']

[[tables]]
name = 'user_account'
doc = 'Users. id=1 is the System User used by AUTH_MODE=off. email and oidc_sub identify OIDC subjects. parent_user_id (self-FK) names the human owner when is_agent=true — agents are user_account rows owned by another user_account, with role rows scoped to a parent-granted subset and token-only authentication (see user_token). ON DELETE CASCADE so deleting a human deletes every agent they own.'

[[tables.columns]]
name = 'id'
type = 'bigserial'
primary_key = true

[[tables.columns]]
name = 'oidc_sub'
type = 'text'
unique = true

[[tables.columns]]
name = 'display_name'
type = 'text'
nullable = false

[[tables.columns]]
name = 'email'
type = 'text'

[[tables.columns]]
name = 'parent_user_id'
type = 'bigint'

[tables.columns.references]
table = 'user_account'
column = 'id'
on_delete = 'cascade'

[[tables.columns]]
name = 'is_agent'
type = 'boolean'
nullable = false
default = 'false'

[[tables.columns]]
name = 'created_at'
type = 'timestamptz'
nullable = false
default = 'now()'

[[tables]]
name = 'session'
doc = 'Server-side session for the BFF auth model. The opaque `id` is what the kitp_session cookie carries (never the OIDC token). `created_at` anchors the absolute re-auth cap; `last_seen_at` is the sliding idle window updated by Manager batched-touch flushes. `revoked_at` set on logout / admin revoke. `oidc_sub` records the OP subject for OIDC sessions so we can rotate when sub changes.'

[[tables.columns]]
name = 'id'
type = 'text'
primary_key = true

[[tables.columns]]
name = 'user_id'
type = 'bigint'
nullable = false

[tables.columns.references]
table = 'user_account'
column = 'id'
on_delete = 'cascade'

[[tables.columns]]
name = 'created_at'
type = 'timestamptz'
nullable = false
default = 'now()'

[[tables.columns]]
name = 'last_seen_at'
type = 'timestamptz'
nullable = false
default = 'now()'

[[tables.columns]]
name = 'revoked_at'
type = 'timestamptz'

[[tables.columns]]
name = 'oidc_sub'
type = 'text'

[[tables.indexes]]
name = 'session_user_id'
columns = ['user_id']

[[tables.indexes]]
name = 'session_last_seen_at'
columns = ['last_seen_at']

[[tables]]
name = 'oidc_state'
doc = 'Short-lived PKCE staging for the server-managed OIDC redirect dance. /auth/oidc/start writes a row keyed by `state`; /auth/oidc/callback reads + deletes it. Rows past `expires_at` are reaped by a periodic sweep.'

[[tables.columns]]
name = 'state'
type = 'text'
primary_key = true

[[tables.columns]]
name = 'verifier'
type = 'text'
nullable = false

[[tables.columns]]
name = 'redirect'
type = 'text'
nullable = false
default = "'/'"

[[tables.columns]]
name = 'created_at'
type = 'timestamptz'
nullable = false
default = 'now()'

[[tables.columns]]
name = 'expires_at'
type = 'timestamptz'
nullable = false

[[tables.indexes]]
name = 'oidc_state_expires_at'
columns = ['expires_at']

[[tables]]
name = 'user_token'
doc = 'Opaque bearer tokens that authenticate an MCP (or future remote) client AS a specific user_account row. Typical use: a human mints a token bound to one of their agent user_accounts, hands it to the MCP client out-of-band. The value is 32 random bytes base64url-encoded — same shape as session.id — and is looked up directly; nothing meaningful is embedded. last_used_at participates in the same batched-touch pattern as session.last_seen_at. ON DELETE CASCADE so revoking the agent user_account row revokes every token bound to it.'

[[tables.columns]]
name = 'id'
type = 'text'
primary_key = true

[[tables.columns]]
name = 'user_id'
type = 'bigint'
nullable = false

[tables.columns.references]
table = 'user_account'
column = 'id'
on_delete = 'cascade'

[[tables.columns]]
name = 'label'
type = 'text'

[[tables.columns]]
name = 'created_at'
type = 'timestamptz'
nullable = false
default = 'now()'

[[tables.columns]]
name = 'last_used_at'
type = 'timestamptz'
nullable = false
default = 'now()'

[[tables.columns]]
name = 'revoked_at'
type = 'timestamptz'

[[tables.columns]]
name = 'expires_at'
type = 'timestamptz'

[[tables.indexes]]
name = 'user_token_user_id'
columns = ['user_id']

[[tables.indexes]]
name = 'user_token_last_used_at'
columns = ['last_used_at']

[[tables]]
name = 'user_card_agent'
doc = "Per-(parent-user, card) routing of a task to one of the parent's agents. The parent owns the assignment; other users in the project never see it. The agent's inbox query joins this table on `agent_user_id = me AND user_id = my_parent`. PK (user_id, card_id) limits one card to one routed agent per parent — sufficient for 'alice has card 42 routed to her research agent' without enabling cross-agent fan-out, which would just be confusing."
primary_key = ['user_id', 'card_id']

[[tables.columns]]
name = 'user_id'
type = 'bigint'
nullable = false

[tables.columns.references]
table = 'user_account'
column = 'id'
on_delete = 'cascade'

[[tables.columns]]
name = 'card_id'
type = 'bigint'
nullable = false

[tables.columns.references]
table = 'card'
column = 'id'
on_delete = 'cascade'

[[tables.columns]]
name = 'agent_user_id'
type = 'bigint'
nullable = false

[tables.columns.references]
table = 'user_account'
column = 'id'
on_delete = 'cascade'

[[tables.columns]]
name = 'created_at'
type = 'timestamptz'
nullable = false
default = 'now()'

[[tables.indexes]]
name = 'user_card_agent_agent_user_id'
columns = ['agent_user_id']

