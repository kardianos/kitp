[[seed]]
doc = "Built-in card types. 'person' is a global card_type (no parent project) used as the assignable entity — see user_account_person for the optional login link. 'milestone' / 'component' / 'tag' are example per-project value-card types — every pick-from-a-list attribute on a task is a card_ref to a card of one of these types (or any custom card_type a project admin adds), scoped to the task's enclosing project. There is no workflow / status type baked in; projects pick their own workflow scheme by defining a card_type and a card_ref attribute_def that targets it. 'screen' / 'filter' carry saved filter presets per project: each project owns one 'screen' card per screen_type (inbox / grid / kanban / project_detail) and each screen owns N filter cards. screen.default_filter (card_ref → filter) picks the preset applied on first load."
